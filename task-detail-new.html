                <template x-if="$store.ui.currentDetailTask">
                    <div class="task-detail" style="padding: 1.5rem;">
                        <!-- Task ID Badge -->
                        <div style="display: inline-block; background: var(--primary); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem;">
                            <span x-text="$store.ui.currentDetailTask.id"></span>
                        </div>

                        <!-- Title -->
                        <h3 style="margin: 0 0 1.5rem 0; font-size: 1.5rem; color: var(--text);" x-text="$store.ui.currentDetailTask.title"></h3>

                        <!-- Metadata Grid -->
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg); border-radius: 8px;">
                            <template x-if="$store.ui.currentDetailTask.priority">
                                <div>
                                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;" x-text="t('meta.priority')"></div>
                                    <div style="font-weight: 500;" x-text="$store.ui.currentDetailTask.priority"></div>
                                </div>
                            </template>

                            <div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;" x-text="t('meta.status')"></div>
                                <div style="font-weight: 500;" x-text="config.columns.find(c => c.id === $store.ui.currentDetailTask.status)?.name || $store.ui.currentDetailTask.status"></div>
                            </div>

                            <template x-if="$store.ui.currentDetailTask.category">
                                <div>
                                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;" x-text="t('meta.category')"></div>
                                    <div style="font-weight: 500;" x-text="$store.ui.currentDetailTask.category"></div>
                                </div>
                            </template>

                            <template x-if="$store.ui.currentDetailTask.created">
                                <div>
                                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.25rem;">Creation date</div>
                                    <div style="font-weight: 500;" x-text="$store.ui.currentDetailTask.created"></div>
                                </div>
                            </template>
                        </div>

                        <!-- Tags -->
                        <template x-if="$store.ui.currentDetailTask.tags && $store.ui.currentDetailTask.tags.length > 0">
                            <div style="margin-bottom: 1.5rem;">
                                <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Tags</div>
                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                                    <template x-for="tag in $store.ui.currentDetailTask.tags" :key="tag">
                                        <span style="background: var(--bg); color: var(--text); padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.85rem;" x-text="tag"></span>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Subtasks -->
                        <div style="margin-bottom: 1.5rem;">
                            <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600;">
                                <span>Subtasks (<span x-text="($store.ui.currentDetailTask.subtasks?.filter(st => st.completed).length || 0) + '/' + ($store.ui.currentDetailTask.subtasks?.length || 0)"></span>)</span>
                            </div>
                            <ul style="list-style: none; padding: 0; margin: 0 0 1rem 0;">
                                <template x-for="(subtask, idx) in ($store.ui.currentDetailTask.subtasks || [])" :key="idx">
                                    <li style="padding: 0.5rem; margin-bottom: 0.25rem; background: var(--bg); border-radius: 4px; display: flex; align-items: center; gap: 0.5rem;">
                                        <input
                                            type="checkbox"
                                            :checked="subtask.completed"
                                            @change="toggleSubtask($store.ui.currentDetailTask.id, idx)"
                                            style="width: 18px; height: 18px; cursor: pointer;"
                                        />
                                        <span
                                            :style="subtask.completed ? 'text-decoration: line-through; color: var(--text-secondary); flex: 1;' : 'flex: 1;'"
                                            x-text="subtask.text"
                                        ></span>
                                        <button
                                            @click="deleteSubtask($store.ui.currentDetailTask.id, idx)"
                                            style="background: none; border: none; cursor: pointer; color: #e53e3e; font-size: 1.1rem; padding: 0.25rem;"
                                            title="Delete subtask"
                                        >🗑️</button>
                                    </li>
                                </template>
                            </ul>
                            <div style="display: flex; gap: 0.5rem;">
                                <input
                                    type="text"
                                    x-model="$store.ui.newSubtaskInput"
                                    placeholder="New subtask..."
                                    @keydown.enter="addSubtask($store.ui.currentDetailTask.id)"
                                    style="flex: 1; padding: 0.5rem; border: 2px solid #cbd5e0; border-radius: 4px; font-size: 0.9rem;"
                                />
                                <button
                                    @click="addSubtask($store.ui.currentDetailTask.id)"
                                    class="btn btn-primary"
                                    style="padding: 0.5rem 1rem;"
                                >+ Add</button>
                            </div>
                        </div>

                        <!-- Notes -->
                        <template x-if="$store.ui.currentDetailTask.notes">
                            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;">
                                <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">Notes</div>
                                <div style="line-height: 1.7; color: var(--text); background: var(--bg); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--primary);" x-html="window.markdownParser.markdownToHtml($store.ui.currentDetailTask.notes)"></div>
                            </div>
                        </template>
                    </div>
                </template>

                <div class="actions">
                    <button
                        class="btn btn-secondary"
                        @click="$store.ui.closeTaskDetail()"
                        x-text="t('taskDetail.close')"
                    ></button>
                    <button
                        class="btn btn-secondary"
                        @click="$store.ui.deleteCurrentTask()"
                        style="background: #ef4444; color: white;"
                    >🗑️ <span x-text="t('taskDetail.delete')"></span></button>
                    <template
                        x-if="$store.ui.currentDetailTask && $store.ui.currentDetailTask.status !== 'archived'"
                    >
                        <button
                            class="btn btn-secondary"
                            @click="$store.ui.archiveCurrentTask()"
                            style="background: #f59e0b; color: white;"
                        >📦 <span x-text="t('taskDetail.archive')"></span></button>
                    </template>
                    <button
                        class="btn btn-primary"
                        @click="$store.ui.editCurrentTask()"
                    >✏️ <span x-text="t('taskDetail.edit')"></span></button>
                </div>
