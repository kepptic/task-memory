<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('page.title')">Markdown Task Manager</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Utilities (load before Alpine) -->
    <script src="js/utils/translations.js"></script>
    <script src="js/utils/fileSystem.js"></script>
    <script src="js/utils/markdown.js"></script>
    <script src="js/utils/fileWatcher.js"></script>

    <!-- Stores (load before app) -->
    <script src="js/stores/taskStore.js"></script>
    <script src="js/stores/uiStore.js"></script>
    <script src="js/stores/filterStore.js"></script>

    <!-- Main App -->
    <script src="js/app.js"></script>
</head>
<body x-data="taskManager()" x-init="init()">
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 x-text="t('header.title')"></h1>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
                <!-- Language Selector -->
                <select @change="setLanguage($event.target.value)"
                        style="padding: 0.6rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; background: white; cursor: pointer;">
                    <option value="en" :selected="currentLanguage === 'en'">English</option>
                    <option value="fr" :selected="currentLanguage === 'fr'">Français</option>
                </select>

                <!-- Project Selector -->
                <template x-if="$store.ui.showProjectSelector">
                    <select @change="switchProject($event.target.value)"
                            style="padding: 0.6rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; background: white; cursor: pointer; min-width: 180px;">
                        <option value="" x-text="t('projects.select')"></option>
                        <template x-for="(project, index) in $store.ui.recentProjects" :key="index">
                            <option :value="index"
                                    :selected="project.handle === $store.tasks.directoryHandle"
                                    x-text="project.displayName || project.name"></option>
                        </template>
                    </select>
                </template>

                <!-- Project Actions -->
                <template x-if="$store.tasks.directoryHandle">
                    <button @click="renameCurrentProject()" class="btn btn-secondary"
                            style="padding: 0.6rem;"
                            :title="t('header.renameProject')">✏️</button>
                </template>

                <template x-if="$store.tasks.directoryHandle">
                    <button @click="deleteCurrentProject()" class="btn btn-secondary"
                            style="padding: 0.6rem;"
                            :title="t('header.deleteProject')">🗑️</button>
                </template>

                <!-- Folder Button -->
                <button @click="selectFolder()" class="btn btn-primary" x-text="t('header.folder')"></button>

                <!-- Action Buttons (visible when project loaded) -->
                <template x-if="$store.tasks.directoryHandle">
                    <button @click="createTask()" class="btn btn-secondary" x-text="t('header.newTask')"></button>
                </template>

                <template x-if="$store.tasks.directoryHandle">
                    <button @click="$store.ui.openArchive()" class="btn btn-secondary" x-text="t('header.archives')"></button>
                </template>

                <template x-if="$store.tasks.directoryHandle">
                    <button @click="$store.ui.openColumns()" class="btn btn-secondary" x-text="t('header.columns')"></button>
                </template>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <div x-show="$store.tasks.directoryHandle && ($store.filters.showFilterBar || $store.filters.hasActiveFilters())"
         style="background: white; border-bottom: 1px solid var(--border-color); padding: 1rem 0;">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 2rem;">
            <!-- Global Search -->
            <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
                <div style="position: relative; max-width: 600px; width: 100%;">
                    <input type="text"
                           x-model="$store.filters.globalSearchTerm"
                           :placeholder="t('filters.search')"
                           style="width: 100%; padding: 0.75rem 3rem 0.75rem 1rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1rem;">
                    <button x-show="$store.filters.globalSearchTerm"
                            @click="$store.filters.clearSearch()"
                            style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #718096; cursor: pointer; font-size: 1.2rem; padding: 0.5rem;"
                            :title="t('filters.searchClear')">✕</button>
                </div>
            </div>

            <!-- Filter Controls -->
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center;">
                <!-- Tag Filter -->
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;" x-text="t('filters.tags')"></label>
                    <select @change="$store.filters.addFilter('tag', $event.target.value); $event.target.value = ''"
                            style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="" x-text="t('filters.select')"></option>
                        <template x-for="tag in $store.filters.availableTags" :key="tag">
                            <option :value="tag" x-text="'#' + tag"></option>
                        </template>
                    </select>
                </div>

                <!-- Category Filter -->
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;" x-text="t('filters.category')"></label>
                    <select @change="$store.filters.addFilter('category', $event.target.value); $event.target.value = ''"
                            style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="" x-text="t('filters.select')"></option>
                        <template x-for="category in $store.filters.availableCategories" :key="category">
                            <option :value="category" x-text="category"></option>
                        </template>
                    </select>
                </div>

                <!-- User Filter -->
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;" x-text="t('filters.user')"></label>
                    <select @change="$store.filters.addFilter('user', $event.target.value); $event.target.value = ''"
                            style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="" x-text="t('filters.select')"></option>
                        <template x-for="user in $store.filters.availableUsers" :key="user">
                            <option :value="user" x-text="user"></option>
                        </template>
                    </select>
                </div>

                <!-- Priority Filter -->
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;" x-text="t('filters.priority')"></label>
                    <select @change="$store.filters.addFilter('priority', $event.target.value); $event.target.value = ''"
                            style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="" x-text="t('filters.select')"></option>
                        <template x-for="priority in $store.filters.availablePriorities" :key="priority">
                            <option :value="priority" x-text="priority"></option>
                        </template>
                    </select>
                </div>

                <!-- Clear All Button -->
                <button @click="$store.filters.clearFilters()"
                        class="btn btn-secondary"
                        style="padding: 0.5rem 1rem;"
                        x-text="t('filters.clearAll')"></button>
            </div>

            <!-- Active Filters -->
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; min-height: 32px; justify-content: center; margin-top: 1rem;">
                <template x-for="filter in $store.filters.activeFilters" :key="filter.type + filter.value">
                    <span class="badge" style="background: #EBF8FF; color: #2B6CB0; padding: 0.25rem 0.75rem; border-radius: 12px; display: flex; align-items: center; gap: 0.5rem;">
                        <span x-text="$store.filters.getFilterLabel(filter.type, filter.value)"></span>
                        <button @click="$store.filters.removeFilter(filter.type, filter.value)"
                                style="background: none; border: none; color: #2B6CB0; cursor: pointer; padding: 0; font-weight: bold;">✕</button>
                    </span>
                </template>
            </div>
        </div>
    </div>

    <!-- Welcome Screen -->
    <div x-show="showWelcome" class="welcome">
        <h2 x-text="t('welcome.title')"></h2>
        <p x-text="t('welcome.description')"></p>
        <button @click="selectFolder()" class="btn btn-primary" style="font-size: 1.1rem; padding: 0.8rem 2rem;" x-text="t('welcome.start')"></button>

        <div style="margin-top: 3rem; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto;">
            <h3 x-text="t('welcome.howItWorks')"></h3>
            <ol style="line-height: 1.8; color: var(--text-secondary);">
                <li x-text="t('welcome.step1')"></li>
                <li x-text="t('welcome.step2')"></li>
                <li x-text="t('welcome.step3')"></li>
                <li x-text="t('welcome.step4')"></li>
                <li x-text="t('welcome.step5')"></li>
            </ol>
            <p style="margin-top: 1rem; color: #e53e3e;" x-text="t('welcome.browserWarning')"></p>
        </div>
    </div>

    <!-- Kanban Board -->
    <div x-show="!showWelcome && hasActiveTasks" id="kanbanView">
        <div class="kanban-board">
            <template x-for="column in config.columns" :key="column.id">
                <div class="kanban-column" :data-column-id="column.id">
                    <div class="column-header">
                        <div class="column-title">
                            <span x-text="column.name"></span>
                            <span class="column-count" x-text="getColumnCount(column.id)"></span>
                        </div>
                    </div>
                    <div class="task-list"
                         @drop="handleDrop($event, column.id)"
                         @dragover="handleDragOver($event)">
                        <template x-for="task in getColumnTasks(column.id)" :key="task.id">
                            <div class="task-card"
                                 :data-task-id="task.id"
                                 draggable="true"
                                 @dragstart="handleDragStart($event, task)"
                                 @dragend="handleDragEnd($event)"
                                 @click="showTaskDetail(task)">
                                <div class="task-header">
                                    <span class="task-id" x-text="task.id"></span>
                                </div>
                                <div class="task-title" x-text="task.title"></div>

                                <!-- Task metadata -->
                                <div class="task-meta">
                                    <template x-if="task.priority">
                                        <span class="badge badge-priority"
                                              :class="getPriorityClass(task.priority)"
                                              x-text="task.priority"></span>
                                    </template>

                                    <template x-if="task.category">
                                        <span class="badge badge-category" x-text="task.category"></span>
                                    </template>

                                    <template x-for="assignee in task.assignees" :key="assignee">
                                        <span class="badge badge-assignee" x-text="assignee"></span>
                                    </template>

                                    <template x-for="tag in task.tags.slice(0, 3)" :key="tag">
                                        <span class="tag" x-text="tag"></span>
                                    </template>
                                </div>

                                <!-- Description preview -->
                                <template x-if="task.description">
                                    <div class="task-description" x-text="task.description"></div>
                                </template>

                                <!-- Subtasks progress -->
                                <template x-if="task.subtasks && task.subtasks.length > 0">
                                    <div class="task-subtasks">
                                        <div class="subtask-progress">
                                            <span x-text="`${getSubtaskProgress(task.subtasks).completed}/${getSubtaskProgress(task.subtasks).total}`"></span>
                                            <div class="progress-bar">
                                                <div class="progress-fill"
                                                     :style="`width: ${getSubtaskProgress(task.subtasks).percentage}%`"></div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Empty state -->
                        <div x-show="getColumnCount(column.id) === 0" class="empty-state">
                            <span x-text="t('empty.noTasks')"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div class="modal" :class="{'active': $store.ui.showTaskModal}" @click.self="$store.ui.closeTaskDetail()">
        <div class="modal-content" x-show="$store.ui.currentDetailTask" @click.stop>
            <div class="modal-header">
                <h2 x-text="t('taskDetail.title')"></h2>
                <button class="close-btn" @click="$store.ui.closeTaskDetail()">&times;</button>
            </div>

            <template x-if="$store.ui.currentDetailTask">
                <div class="task-detail">
                    <h3 x-text="$store.ui.currentDetailTask.title"></h3>
                    <p><strong x-text="t('meta.priority') + ':'"></strong> <span x-text="$store.ui.currentDetailTask.priority || '-'"></span></p>
                    <p><strong x-text="t('meta.category') + ':'"></strong> <span x-text="$store.ui.currentDetailTask.category || '-'"></span></p>
                    <p><strong x-text="t('meta.assigned') + ':'"></strong> <span x-text="$store.ui.currentDetailTask.assignees.join(', ') || '-'"></span></p>
                    <p><strong x-text="t('meta.tags') + ':'"></strong> <span x-text="$store.ui.currentDetailTask.tags.join(' ') || '-'"></span></p>

                    <template x-if="$store.ui.currentDetailTask.description">
                        <div>
                            <strong x-text="t('meta.description') + ':'"></strong>
                            <p x-text="$store.ui.currentDetailTask.description"></p>
                        </div>
                    </template>

                    <template x-if="$store.ui.currentDetailTask.notes">
                        <div>
                            <strong x-text="t('meta.notes') + ':'"></strong>
                            <div x-html="window.markdownParser.markdownToHtml($store.ui.currentDetailTask.notes)"></div>
                        </div>
                    </template>

                    <div class="actions">
                        <button class="btn btn-secondary" @click="$store.ui.closeTaskDetail()" x-text="t('taskDetail.close')"></button>
                        <button class="btn btn-secondary" @click="$store.ui.editCurrentTask()" x-text="t('taskDetail.edit')"></button>
                        <template x-if="$store.ui.currentDetailTask.status !== 'archived'">
                            <button class="btn btn-secondary" @click="$store.ui.archiveCurrentTask()" x-text="t('taskDetail.archive')"></button>
                        </template>
                        <button class="btn btn-secondary" style="background: #fee;" @click="$store.ui.deleteCurrentTask()" x-text="t('taskDetail.delete')"></button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Task Form Modal -->
    <div class="modal" :class="{'active': $store.ui.showTaskFormModal}" @click.self="$store.ui.closeTaskForm()">
        <div class="modal-content" @click.stop>
            <div class="modal-header">
                <h2 x-text="$store.ui.isEditMode ? t('taskForm.editTask') : t('taskForm.newTask')"></h2>
                <button class="close-btn" @click="$store.ui.closeTaskForm()">&times;</button>
            </div>

            <form @submit.prevent="$store.ui.submitTaskForm()">
                <div class="form-group">
                    <label x-text="t('taskForm.titleLabel')"></label>
                    <input type="text" x-model="$store.ui.taskForm.title" required>
                </div>

                <div class="form-group">
                    <label x-text="t('taskForm.columnLabel')"></label>
                    <select x-model="$store.ui.taskForm.status" required>
                        <template x-for="column in config.columns" :key="column.id">
                            <option :value="column.id" x-text="column.name"></option>
                        </template>
                    </select>
                </div>

                <div class="form-group">
                    <label x-text="t('taskForm.descriptionLabel')"></label>
                    <textarea x-model="$store.ui.taskForm.description" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label x-text="t('taskForm.notesLabel')"></label>
                    <textarea x-model="$store.ui.taskForm.notes" rows="6" :placeholder="t('taskForm.notesPlaceholder')"></textarea>
                </div>

                <div class="actions">
                    <button type="button" class="btn btn-secondary" @click="$store.ui.closeTaskForm()" x-text="t('taskForm.cancel')"></button>
                    <button type="submit" class="btn btn-primary" x-text="$store.ui.isEditMode ? t('taskForm.save') : t('taskForm.create')"></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Archive Modal -->
    <div class="modal" :class="{'active': $store.ui.showArchiveModal}" @click.self="$store.ui.closeArchive()">
        <div class="modal-content" style="max-width: 900px;" @click.stop>
            <div class="modal-header">
                <h2 x-text="t('archives.title')"></h2>
                <button class="close-btn" @click="$store.ui.closeArchive()">&times;</button>
            </div>

            <div style="padding: 1.5rem;">
                <div style="margin-bottom: 1rem;">
                    <input type="text"
                           x-model="$store.filters.archiveSearchTerm"
                           :placeholder="t('archives.search')"
                           style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem;">
                </div>

                <div style="max-height: 500px; overflow-y: auto;">
                    <template x-for="task in $store.filters.getFilteredArchivedTasks($store.tasks.archivedTasks)" :key="task.id">
                        <div class="task-card" style="margin-bottom: 1rem; cursor: pointer;" @click="showTaskDetail(task)">
                            <div class="task-header">
                                <span class="task-id" x-text="task.id"></span>
                                <button @click.stop="$store.ui.restoreArchivedTask(task.id)"
                                        class="btn btn-secondary"
                                        style="padding: 0.25rem 0.5rem; font-size: 0.8rem;"
                                        x-text="t('action.restore')"></button>
                            </div>
                            <div class="task-title" x-text="task.title"></div>
                        </div>
                    </template>

                    <div x-show="$store.tasks.archivedTasks.length === 0" class="empty-state">
                        <span x-text="t('archives.empty')"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Columns Modal -->
    <div class="modal" :class="{'active': $store.ui.showColumnsModal}" @click.self="$store.ui.closeColumns()">
        <div class="modal-content" style="max-width: 500px;" @click.stop>
            <div class="modal-header">
                <h2 x-text="t('columns.title')"></h2>
                <button class="close-btn" @click="$store.ui.closeColumns()">&times;</button>
            </div>

            <div style="padding: 1.5rem;">
                <div>
                    <template x-for="(column, index) in config.columns" :key="column.id">
                        <div style="display: flex; align-items: center; margin-bottom: 1rem; padding: 0.75rem; background: #f7f7f7; border-radius: 6px;">
                            <span style="flex: 1;" x-text="column.name + ' (' + column.id + ')'"></span>
                            <button @click="removeColumn(column.id)"
                                    class="btn btn-secondary"
                                    style="padding: 0.25rem 0.5rem; background: #fee;"
                                    x-text="t('action.delete')"></button>
                        </div>
                    </template>
                </div>
                <button @click="addColumn()" class="btn btn-primary" style="margin-top: 1rem; width: 100%;" x-text="t('columns.add')"></button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" :class="{'show': $store.ui.notification.show, [$store.ui.notification.type]: true}">
        <span x-text="$store.ui.notification.message"></span>
    </div>
</body>
</html>
